root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/vibecodepc ./server/..."
  bin = "./tmp/vibecodepc"
  full_bin = "./tmp/vibecodepc"
  include_ext = ["go"]
  exclude_dir = ["client", "tmp", "dist", "server/public"]
  delay = 500
  stop_on_error = true
  log = "build-errors.log"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
